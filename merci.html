<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription confirmée - Aéroport Abidjan</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #002b4e, #1a4b75);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .success-card {
            background: white;
            border-radius: 32px;
            padding: 3rem 2rem;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 30px 50px rgba(0,0,0,0.3);
        }
        .success-icon {
            font-size: 5rem;
            color: #2e7d32;
            margin-bottom: 1rem;
        }
        h1 {
            color: #002b4e;
            margin-bottom: 1rem;
        }
        p {
            color: #2c3e50;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .btn {
            background: #002b4e;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover {
            background: #001f39;
        }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="success-icon">✓</div>
        <h1>Inscription confirmée !</h1>
        <p>Votre inscription a bien été enregistrée.<br>
        Vous recevrez un email de confirmation dans les plus brefs délais.<br>
        <strong>Pour ceux qui ont effectué le paiement :</strong> votre carte CNPS vous sera envoyée par Gmail sous 24h.</p>
        <a href="index.html" class="btn">Retour à l'accueil</a>
    </div>
</body>
</html>
